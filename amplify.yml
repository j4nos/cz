version: 1
backend:
  phases:
    build:
      commands:
        - npm ci --cache .npm --prefer-offline
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID --outputs-out-dir .
frontend:
  phases:
    build:
      commands:
        - test -f amplify_outputs.json
        - node -e "const o=require('./amplify_outputs.json'); if(!o?.data?.url){throw new Error('Missing data.url in amplify_outputs.json');} console.log('Using amplify_outputs.json:', o.data.url);"
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - .next/cache/**/*
      - .npm/**/*
      - node_modules/**/*
